services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meeting_ai
      POSTGRES_USER: meeting_ai
      POSTGRES_PASSWORD: meeting_ai
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pg_data:
